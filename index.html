<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Sky</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="stars"></div>

<div id="intro">

<h1>For My Sky</h1>
<p>A small story for you</p>

<button id="startButton">Begin</button>

</div>


<div id="story">

<h2 id="chapter"></h2>

<div id="text"></div>

<button id="next">Continue</button>

</div>


<div id="gallery">

<h2>Our Moments</h2>

<img id="galleryImage" src="photos/photo1.jpg">

<div class="galleryButtons">

<button id="prevPhoto">←</button>
<button id="nextPhoto">→</button>

</div>

<button id="continueStory">Continue the story</button>

</div>


<audio id="music">
<source src="golden_brown.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
