<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sky</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<!-- Фон звездное небо -->
<canvas id="stars"></canvas>

<!-- Анимационные сердечки -->
<div class="hearts"></div>

<div class="container">

  <!-- Начальный экран -->
  <div id="start-screen">
    <h1>For My Sky</h1>
    <p>A small story for you</p>
    <button id="startBtn">Begin</button>
  </div>

  <!-- История -->
  <div id="story" class="hidden">
    <h2 id="chapter"></h2>
    <p id="text"></p>
    <button id="nextBtn">Continue</button>
  </div>

  <!-- Галерея -->
  <div id="gallery" class="hidden">
    <h2>Our Moments</h2>
    <img id="galleryImage" src="photo1.jpg" alt="Photo">
    <div class="gallery-controls">
      <button id="prevPhoto">←</button>
      <button id="nextPhoto">→</button>
    </div>
    <button id="continueStory">Continue the story</button>
  </div>

</div>

<!-- Музыка -->
<audio id="music">
  <source src="golden_brown.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
